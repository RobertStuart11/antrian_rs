<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – RS Sehat Sejahtera</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0F6E56; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .logo-icon { width: 64px; height: 64px; background: #E1F5EE; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .btn-rs { background: #0F6E56; color: #fff; border: none; padding: 10px; font-size: 15px; border-radius: 8px; }
    .btn-rs:hover { background: #085041; color: #fff; }
    .form-control { border-radius: 8px; border-color: #dee2e6; }
    .form-control:focus { border-color: #0F6E56; box-shadow: 0 0 0 .2rem rgba(15,110,86,.15); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon">
      <i class="bi bi-hospital" style="font-size:28px;color:#0F6E56"></i>
    </div>
    <h5 class="text-center fw-bold mb-1" style="color:#0F6E56">RS Sehat Sejahtera</h5>
    <p class="text-center text-muted mb-4" style="font-size:13px">Sistem Antrian Poliklinik</p>

    {% if form.errors %}
    <div class="alert alert-danger py-2 text-center" style="font-size:13px">
      <i class="bi bi-exclamation-circle"></i> Username atau password salah.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-500" style="font-size:13px">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Masukkan username" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" style="font-size:13px">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-rs w-100">
        <i class="bi bi-box-arrow-in-right"></i> Masuk
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center mb-0" style="font-size:12px">
      <a href="{% url 'ambil_antrian' %}" style="color:#0F6E56">
        <i class="bi bi-ticket-perforated"></i> Ambil Nomor Antrian (Pasien)
      </a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
