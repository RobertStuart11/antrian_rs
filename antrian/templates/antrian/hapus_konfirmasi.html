{% extends 'antrian/base.html' %}
{% block title %}Hapus {{ nama }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-danger">
      <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:48px"></i>
        <h5 class="mt-3 mb-2">Hapus Poliklinik?</h5>
        <p class="text-muted">Anda akan menghapus <strong>{{ nama }}</strong>. Data antrian terkait juga bisa terpengaruh. Tindakan ini tidak dapat dibatalkan.</p>
        <div class="d-flex gap-2 justify-content-center mt-4">
          <a href="{% url 'kelola_poliklinik' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i> Batal</a>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Ya, Hapus</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
